<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations — tjSTAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <img src="img/logo.png" alt="tjSTAR" class="nav__icon">
        <span class="nav__title">tjSTAR</span>
        <span class="nav__countdown-timer" id="countdownTimer"></span>
      </a>
      <button class="nav__toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav__links" id="navLinks">
        <a href="index.html" class="nav__link">Home</a>
        <a href="index.html#about" class="nav__link">About</a>
        <a href="index.html#schedule" class="nav__link">Schedule</a>
        <a href="presentations.html" class="nav__link" style="color:#fff;">Presentations</a>
        <a href="connect.html" class="nav__link">Connect</a>
      </div>
    </div>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <h1>Presentations</h1>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-bar__inner">
      <input type="text" id="searchInput" placeholder="Search title, author, abstract…">
      <select id="labFilter">
        <option value="">All Labs</option>
      </select>
      <div class="slot-pills" id="slotPills"></div>
      <button class="filter-bar__clear" id="clearBtn">Clear filters</button>
      <span class="filter-bar__count" id="resultCount"></span>
    </div>
  </div>

  <!-- PRESENTATION LIST -->
  <div class="pres-grid section--paper">
    <div class="pres-list" id="presList"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__col">
        <p class="footer__brand">tjSTAR</p>
        <p class="footer__sub">Thomas Jefferson High School for Science and Technology</p>
        <p class="footer__address">6560 Braddock Road · Alexandria, VA 22312</p>
      </div>
      <div class="footer__col">
        <p class="footer__heading">Explore</p>
        <a href="index.html#about">About tjSTAR</a>
        <a href="index.html#schedule">Schedule</a>
        <a href="presentations.html">Presentations</a>
      </div>
      <div class="footer__col">
        <p class="footer__heading">Follow TJHSST</p>
        <div class="footer__socials">
          <a href="https://x.com/TJHSST_Official" target="_blank" rel="noopener" class="social-dot" aria-label="X/Twitter">x</a>
          <a href="https://www.instagram.com/officialtjhsst/" target="_blank" rel="noopener" class="social-dot" aria-label="Instagram">ig</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="src/presentations-data.js"></script>
  <script src="src/presentations-app.js"></script>
  <script>
    // Nav toggle
    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    if (navToggle) {
      navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
      document.querySelectorAll('.nav__link').forEach(l => l.addEventListener('click', () => navLinks.classList.remove('open')));
    }
    // Countdown
    const ct = document.getElementById('countdownTimer');
    if (ct) {
      const target = new Date('2026-05-20T08:40:00-04:00').getTime();
      function tick() {
        const diff = target - Date.now();
        if (diff <= 0) { ct.textContent = 'Today!'; return; }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        const p = [];
        if (d > 0) p.push(d + 'd');
        p.push(String(h).padStart(2,'0') + 'h');
        p.push(String(m).padStart(2,'0') + 'm');
        p.push(String(s).padStart(2,'0') + 's');
        ct.textContent = p.join(' ');
      }
      tick(); setInterval(tick, 1000);
    }
  </script>
</body>
</html>
